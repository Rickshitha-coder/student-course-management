<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#2E7D32,#66BB6A);
overflow:hidden;
}

.container{
text-align:center;
color:white;
animation:fadeIn 2s;
}

h1{
font-size:50px;
margin-bottom:15px;
}

p{
font-size:22px;
}

.loader{
margin:35px auto;
width:70px;
height:70px;
border:8px solid rgba(255,255,255,.3);
border-top:8px solid white;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>

<body>

<div class="container">

<h1>Welcome</h1>

<p>Student Course Management System</p>

<div class="loader"></div>

</div>

<script>

setTimeout(function(){

window.location.href="index.html";

},2000);

</script>

</body>
</html>
